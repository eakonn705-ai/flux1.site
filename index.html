<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUX — Image Synthesis</title>
<style>
  :root{
    --ink:#15120F;
    --paper:#F3EEE6;
    --flash:#FF5A1F;
    --flash-dim:#7A2C0E;
    --line:#3A332C;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --disp: 'Georgia', 'Times New Roman', serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:var(--mono);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:56px 24px 80px;
  }

  /* ===== Header ===== */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:24px;
    margin-bottom:48px;
  }
  .brand{
    font-family:var(--disp);
    font-size:42px;
    letter-spacing:-0.5px;
    line-height:1;
  }
  .brand span{color:var(--flash); font-style:italic;}
  .meta{
    text-align:right;
    font-size:11px;
    color:#8C8378;
    letter-spacing:0.08em;
    text-transform:uppercase;
    line-height:1.6;
  }

  /* ===== Aperture signature ===== */
  .aperture{
    width:14px;height:14px;
    border-radius:50%;
    border:1.5px solid var(--flash);
    display:inline-block;
    margin-right:8px;
    position:relative;
    vertical-align:-2px;
  }
  .aperture::after{
    content:'';
    position:absolute;
    top:50%;left:50%;
    width:4px;height:4px;
    background:var(--flash);
    border-radius:50%;
    transform:translate(-50%,-50%);
    animation:blink 2.4s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}

  /* ===== Sections ===== */
  .label{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--flash);
    margin-bottom:10px;
    display:block;
  }
  .field{margin-bottom:28px;}
  textarea, input[type=text], input[type=password], select{
    width:100%;
    background:transparent;
    border:1px solid var(--line);
    color:var(--paper);
    font-family:var(--mono);
    font-size:15px;
    padding:14px 16px;
    border-radius:2px;
    transition:border-color .2s;
  }
  textarea:focus, input:focus, select:focus{
    outline:none;
    border-color:var(--flash);
  }
  textarea{resize:vertical; min-height:88px; line-height:1.5;}
  ::placeholder{color:#5C5448;}

  .grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .grid3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
  }
  @media(max-width:640px){
    .grid2,.grid3{grid-template-columns:1fr;}
  }

  small.help{
    display:block;
    margin-top:8px;
    font-size:12px;
    color:#7A7266;
    line-height:1.5;
  }
  small.help a{color:var(--flash); text-decoration:none; border-bottom:1px dotted var(--flash-dim);}

  /* ===== Token row ===== */
  .token-row{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .token-row input{flex:1;}
  .toggle-vis{
    background:none;
    border:1px solid var(--line);
    color:#8C8378;
    font-family:var(--mono);
    font-size:11px;
    padding:14px 12px;
    cursor:pointer;
    border-radius:2px;
  }
  .toggle-vis:hover{border-color:var(--flash); color:var(--flash);}

  /* ===== Range ===== */
  .range-label{display:flex; justify-content:space-between; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--flash); margin-bottom:10px;}
  .range-label b{color:var(--paper); font-weight:normal;}
  input[type=range]{
    width:100%;
    -webkit-appearance:none;
    height:1px;
    background:var(--line);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:12px;height:12px;
    border-radius:50%;
    background:var(--flash);
    cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:12px;height:12px;
    border:none;border-radius:50%;
    background:var(--flash);
    cursor:pointer;
  }

  /* ===== Button ===== */
  .fire{
    width:100%;
    background:var(--flash);
    color:var(--ink);
    border:none;
    font-family:var(--mono);
    font-weight:bold;
    font-size:14px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:18px;
    cursor:pointer;
    border-radius:2px;
    margin-top:8px;
    transition:background .15s, transform .1s;
  }
  .fire:hover{background:#FF7438;}
  .fire:active{transform:scale(0.99);}
  .fire:disabled{background:#594B3D; color:#998D7E; cursor:not-allowed;}

  /* ===== Result stage ===== */
  .stage{
    margin-top:56px;
    border:1px solid var(--line);
    border-radius:2px;
    min-height:360px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 23px, var(--line) 23px, var(--line) 24px);
    background-size:100% 24px;
  }
  .stage img{
    max-width:100%;
    display:block;
  }
  .stage-empty{
    text-align:center;
    color:#5C5448;
    font-size:13px;
    letter-spacing:.05em;
  }
  .stage-empty .ap-big{
    width:48px;height:48px;
    border:1px solid #3A332C;
    border-radius:50%;
    margin:0 auto 16px;
    position:relative;
  }
  .stage-empty .ap-big::before,.stage-empty .ap-big::after{
    content:'';
    position:absolute;
    background:#3A332C;
  }
  .stage-empty .ap-big::before{top:50%;left:6px;right:6px;height:1px;transform:translateY(-50%);}
  .stage-empty .ap-big::after{left:50%;top:6px;bottom:6px;width:1px;transform:translateX(-50%);}

  .stage.loading .ap-big{
    animation:spin 1.2s linear infinite;
    border-color:var(--flash);
  }
  .stage.loading .ap-big::before,.stage.loading .ap-big::after{background:var(--flash);}
  @keyframes spin{to{transform:rotate(360deg);}}

  .stage-error{
    color:#FF8A65;
    font-size:13px;
    padding:24px;
    text-align:center;
    line-height:1.6;
    white-space:pre-wrap;
  }

  .result-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:14px;
    font-size:12px;
    color:#7A7266;
  }
  .result-bar a{color:var(--flash); text-decoration:none;}
  .result-bar a:hover{text-decoration:underline;}

  footer{
    margin-top:64px;
    padding-top:24px;
    border-top:1px solid var(--line);
    font-size:11px;
    color:#5C5448;
    letter-spacing:.04em;
    display:flex;
    justify-content:space-between;
  }
  footer a{color:#8C8378;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand"><span class="aperture"></span>FLUX<span>.1</span></div>
    <div class="meta">Hugging Face Inference API<br>black-forest-labs / FLUX.1</div>
  </header>

  <div class="field">
    <label class="label" for="token">Hugging Face アクセストークン</label>
    <div class="token-row">
      <input type="password" id="token" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
      <button class="toggle-vis" id="toggleVis" type="button">表示</button>
    </div>
    <small class="help">
      トークンはこのページ内のメモリにのみ保持され、保存・送信先はHugging Face APIのみです。
      <a href="https://huggingface.co/settings/tokens" target="_blank" rel="noopener">トークンを発行する</a>
      （Read権限で十分です）
    </small>
  </div>

  <div class="field">
    <label class="label" for="model">モデル</label>
    <select id="model">
      <option value="black-forest-labs/FLUX.1-schnell">FLUX.1-schnell（高速・低ステップ向け）</option>
      <option value="black-forest-labs/FLUX.1-dev">FLUX.1-dev（高品質・要ライセンス同意）</option>
    </select>
    <small class="help">dev モデルは <a href="https://huggingface.co/black-forest-labs/FLUX.1-dev" target="_blank" rel="noopener">モデルページ</a>で利用許諾への同意が必要です。</small>
  </div>

  <div class="field">
    <label class="label" for="prompt">プロンプト</label>
    <textarea id="prompt" placeholder="例：a foggy harbor at dawn, a single red lighthouse, long exposure, cinematic light"></textarea>
  </div>

  <div class="field">
    <label class="label" for="negative">ネガティブプロンプト（任意）</label>
    <input type="text" id="negative" placeholder="例：blurry, low quality, watermark">
  </div>

  <div class="grid3">
    <div class="field">
      <div class="range-label"><span>幅</span><b id="widthVal">1024</b></div>
      <input type="range" id="width" min="256" max="1536" step="64" value="1024">
    </div>
    <div class="field">
      <div class="range-label"><span>高さ</span><b id="heightVal">1024</b></div>
      <input type="range" id="height" min="256" max="1536" step="64" value="1024">
    </div>
    <div class="field">
      <div class="range-label"><span>ステップ数</span><b id="stepsVal">4</b></div>
      <input type="range" id="steps" min="1" max="50" step="1" value="4">
    </div>
  </div>

  <div class="field">
    <div class="range-label"><span>Guidance Scale</span><b id="guidanceVal">3.5</b></div>
    <input type="range" id="guidance" min="0" max="10" step="0.5" value="3.5">
  </div>

  <button class="fire" id="generateBtn" type="button">生成する</button>

  <div class="stage" id="stage">
    <div class="stage-empty" id="stageEmpty">
      <div class="ap-big"></div>
      画像はまだありません
    </div>
  </div>

  <div class="result-bar" id="resultBar" style="display:none;">
    <span id="elapsed"></span>
    <a id="downloadLink" download="flux-output.png">ダウンロード ↓</a>
  </div>

  <footer>
    <span>HF Inference API 経由で black-forest-labs/FLUX.1 を呼び出します</span>
    <a href="https://huggingface.co/docs/api-inference" target="_blank" rel="noopener">API docs</a>
  </footer>
</div>

<script>
  // ↓ Cloudflare Worker をデプロイしたら、ここをそのURLに書き換えてください
  // 例: const API_BASE = 'https://flux-proxy.your-subdomain.workers.dev';
  const API_BASE = 'https://shiny-star-dae1.18-kota-shobun.workers.dev/';

  const $ = id => document.getElementById(id);

  // スライダーの数値表示同期
  [['width','widthVal'],['height','heightVal'],['steps','stepsVal'],['guidance','guidanceVal']]
    .forEach(([sliderId,labelId]) => {
      const s = $(sliderId);
      s.addEventListener('input', () => $(labelId).textContent = s.value);
    });

  // トークン表示/非表示
  $('toggleVis').addEventListener('click', () => {
    const t = $('token');
    if(t.type === 'password'){ t.type='text'; $('toggleVis').textContent='隠す'; }
    else { t.type='password'; $('toggleVis').textContent='表示'; }
  });

  let currentObjectUrl = null;

  function setStage(mode, payload){
    const stage = $('stage');
    const resultBar = $('resultBar');
    stage.classList.remove('loading');
    stage.innerHTML = '';

    if(mode === 'empty'){
      stage.innerHTML = '<div class="stage-empty" id="stageEmpty"><div class="ap-big"></div>画像はまだありません</div>';
      resultBar.style.display = 'none';
    }
    if(mode === 'loading'){
      stage.classList.add('loading');
      stage.innerHTML = '<div class="stage-empty"><div class="ap-big"></div>生成中…（モデルのロードに数十秒かかることがあります）</div>';
      resultBar.style.display = 'none';
    }
    if(mode === 'image'){
      const img = document.createElement('img');
      img.src = payload.url;
      stage.appendChild(img);
      $('downloadLink').href = payload.url;
      resultBar.style.display = 'flex';
      $('elapsed').textContent = payload.elapsed + ' 秒';
    }
    if(mode === 'error'){
      stage.innerHTML = '<div class="stage-error">⚠ ' + payload + '</div>';
      resultBar.style.display = 'none';
    }
  }

  $('generateBtn').addEventListener('click', async () => {
    const token = $('token').value.trim();
    const prompt = $('prompt').value.trim();
    const negative = $('negative').value.trim();
    const model = $('model').value;
    const width = parseInt($('width').value, 10);
    const height = parseInt($('height').value, 10);
    const steps = parseInt($('steps').value, 10);
    const guidance = parseFloat($('guidance').value);

    if(!token){ setStage('error', 'Hugging Face のアクセストークンを入力してください。'); return; }
    if(!prompt){ setStage('error', 'プロンプトを入力してください。'); return; }

    const btn = $('generateBtn');
    btn.disabled = true;
    btn.textContent = '生成中…';
    setStage('loading');

    const started = performance.now();

    const body = {
      inputs: prompt,
      parameters: {
        width, height,
        num_inference_steps: steps,
        guidance_scale: guidance
      }
    };
    if(negative) body.parameters.negative_prompt = negative;

    try {
      const res = await fetch(API_BASE + '/models/' + model, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if(!res.ok){
        let detail = '';
        try {
          const errJson = await res.json();
          detail = errJson.error || JSON.stringify(errJson);
        } catch(e){
          detail = await res.text();
        }
        throw new Error('HTTP ' + res.status + ' — ' + detail);
      }

      const contentType = res.headers.get('content-type') || '';
      if(contentType.includes('application/json')){
        // モデルロード中などはJSONでエラー/推定時間が返る場合がある
        const j = await res.json();
        throw new Error(j.error ? j.error + (j.estimated_time ? '（推定待機時間: ' + Math.round(j.estimated_time) + '秒。少し待って再実行してください）' : '') : JSON.stringify(j));
      }

      const blob = await res.blob();
      if(currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
      currentObjectUrl = URL.createObjectURL(blob);

      const elapsed = ((performance.now() - started) / 1000).toFixed(1);
      setStage('image', { url: currentObjectUrl, elapsed });

    } catch(err){
      setStage('error', err.message || String(err));
    } finally {
      btn.disabled = false;
      btn.textContent = '生成する';
    }
  });
</script>
</body>
</html>
